aid: sanderson-farms
name: Sanderson Farms
description: >-
  Sanderson Farms was the third-largest poultry producer in the United States,
  producing over 13 million chickens per week before being acquired by a joint
  venture of Cargill and Continental Grain in 2022 to form Wayne-Sanderson Farms.
  Headquartered in Laurel, Mississippi, the company operated processing facilities
  across the southeastern United States and was a Fortune 1000 company. As a
  large-scale agricultural and food production enterprise, Sanderson Farms does
  not offer public developer APIs. The company focused on poultry processing,
  supply chain management, and food safety operations.
